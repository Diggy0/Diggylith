- type: entity
  parent: ClothingOuterHardsuitVoidParamed
  id: ClothingOuterHardsuitCybersunParamedic
  name: CSI-122M "Xiézhù" hardsuit
  description: A less armored and more legal version of the "Guānlián" hardsuit, used by medical technicians, promoted by Interdyne.
  components:
  - type: Sprite
    sprite: _Omu/Clothing/OuterClothing/Hardsuits/cybersunparamedhardsuit.rsi
  - type: Clothing
    sprite: _Omu/Clothing/OuterClothing/Hardsuits/cybersunparamedhardsuit.rsi
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingHeadHelmetCybersunParamedic
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock

- type: entity
  parent: ClothingOuterHardsuitBase # Aurum - Removal of BaseSyndicate Contraband.
  id: ClothingOuterHardsuitCybersunScience
  name: CSI-128X "Guānlián" hardsuit
  description: Designed with scientific research in mind, this hardsuit designed by Cybersun Industries protects from most enviromental hazards, with the downside of less physical protection. Used by Cybersun Industries researchers. # Aurum - Lore Changes
  components:
  - type: Sprite
    sprite: _Omu/Clothing/OuterClothing/Hardsuits/cybersunscientisthardsuit.rsi
  - type: Clothing
    sprite: _Omu/Clothing/OuterClothing/Hardsuits/cybersunscientisthardsuit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.001
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: FireProtection
    reduction: 0.6
#  - type: ZombificationResistance
#    zombificationResistanceCoefficient: 0.55
  - type: Armor
    #    coverage: Aurum - We do not have woundmed.
#    - Chest
#    traumaDeductions:
#      Dismemberment: 0.2
#      OrganDamage: 0.2
#      BoneDamage: 0.2
#      VeinsDamage: 0
#      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.80
        Heat: 0.2 # Aurum - Improved damage resistances.
        Radiation: 0.0 # Aurum - Improved damage resistances.
        Caustic: 0.0 # Aurum - Improved damage resistances.
  - type: ClothingSpeedModifier
    walkModifier: 1 # Aurum - From 0,9 to 1.
    sprintModifier: 1 # Aurum - From 0,9 to 1.
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingHeadHelmetCybersunScience
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock



